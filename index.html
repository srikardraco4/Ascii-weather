<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASCII Weather</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="c"></canvas>

  <div id="ui" role="group" aria-label="Weather mode">
    <button data-mode="rain" class="mode active">Rain</button>
    <button data-mode="snow" class="mode">Snow</button>
    <button data-mode="wind" class="mode">Wind</button>
    <button data-mode="fog" class="mode">Fog</button>
    <button data-mode="thunder" class="mode">Thunder</button>
    <button data-mode="sunny" class="mode">Sunny</button>
    <button data-mode="night" class="mode">Night</button>

    <div id="speedbar" class="speedbar" role="group" aria-label="Particle speed">
      <label for="speed" class="speedlabel">Speed</label>
      <input id="speed" class="speedinput" type="range" min="0.2" max="10.0" step="0.05" value="1" />
      <span id="speedval" class="speedval">1.00x</span>
    </div>
  </div>


  <script src="app.js" defer></script>
</body>
</html>
